# -----------------------------
# 使用说明（Template 使用与占位符替换示例）
# -----------------------------
# 占位符说明：
# - `__PROXIES__` : 订阅转换器应将此占位符替换为完整的 `proxies:` 列表（YAML 列表格式），包括每个节点的所有字段。
# - `__PROXY_NAMES__` : 用于代理分组，替换为代理名称的逗号/方括号列表（无需引号或带引号均可），例如："节点1, 节点2" 或 ["节点1","节点2"]。
# - `__PROXY_GROUPS__` :（可选）如果你想让生成器替换整个 `proxy-groups` 区块，可以使用此占位符。

# 最小替换示例（Mustache 风格或简单模板替换都可）：
# 模板片段：
# proxies: __PROXIES__
# proxy-groups:
#   - name: "Proxy"
#     type: select
#     proxies: [__PROXY_NAMES__]
#
# Mustache 示例（伪代码）：
# {
#   "proxies": {{#nodes}}
#   - name: "{{name}}"
#     type: {{type}}
#     server: {{server}}
#     port: {{port}}
#   {{/nodes}}
# }

# PowerShell (pwsh) 简单替换示例：
# 假设已有 `proxies.yaml` 内容（已是 YAML 列表），将其注入模板中的 `__PROXIES__`：
#
# $tpl = Get-Content -Raw .\clash\template.yaml
# $proxies = Get-Content -Raw .\out\proxies.yaml
# $tpl = $tpl -replace '__PROXIES__', $proxies
# $tpl | Set-Content .\clash\generated.yaml
#
# 将代理名称列表注入 `__PROXY_NAMES__`（逗号或 JSON 数组形式）：
# $names = '"节点1","节点2","节点3"'   # 或者生成 JSON 数组
# $tpl = $tpl -replace '\[__PROXY_NAMES__\]', "[$names]"

# 注意与建议：
# - 确保注入的 YAML 格式正确（缩进与换行），否则 clash 解析会失败。
# - 推荐先将 `__PROXIES__` 替换为多行 YAML（包含每个代理完整字段），再将 `__PROXY_NAMES__` 替换为代理名称数组。
# - 如果需要 `proxy-providers` 功能，请在 `proxy-providers:` 下以 YAML 对象形式填充，并在 `proxy-groups` 中使用 `PROXY-PROVIDER-NAME`。

# 示例：最终生成后的关键段（缩略示意）
# proxies:
# - name: "节点1"
#   type: vmess
#   server: 1.2.3.4
#   port: 443
# - name: "节点2"
#   type: ss
#   server: 5.6.7.8
#   port: 8388
#
# proxy-groups:
# - name: "Proxy"
#   type: select
#   proxies:
#     - 节点1
#     - 节点2

# 如果你希望我为订阅转换器生成一个示例脚本（Node/Python/PowerShell），告诉我偏好语言，我可以继续生成。
