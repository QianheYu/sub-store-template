  # UDP 443/3478 流量兜底 (移至规则末尾，防止截断域名规则)
  # - AND,((NETWORK,UDP),(DST-PORT,443),(NOT,((GEOIP,CN)))),🚀 节点选择
  # - AND,((NETWORK,UDP),(DST-PORT,443),(GEOIP,CN)),DIRECT
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT
  # - AND,((NETWORK,UDP),(DST-PORT,3478)),🚀 节点选择
  - MATCH,🚀 节点选择

dns:
  enable: true
  prefer-h3: false # DOH 优先使用 http/3
  use-hosts: false # 是否回应配置中的 hosts，默认 true
  use-system-hosts: false # 是否查询系统 hosts，默认 true，我们不用系统 hosts
  ipv6: false # 建议关闭 IPv6，因为 IPv6 经常是 DNS 泄漏的罪魁祸首
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip # 必须使用 fake-ip 模式防止泄漏

  # Fake-IP 范围
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist

  # 排除名单：这些域名不使用 Fake-IP，直接解析真实 IP（防止某些软件崩溃）
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.arpa"
    - "+.in-addr.arpa"
    - "time.*.com"
    - "ntp.*.com"
    - "dns.google"
    - "dns.alidns.com"
    - "+.srv.nintendo.net"
    - "+.stun.playstation.net"
    - "*.msftncs.com"
    - "*.msftconnecttest.com"
    - "localhost.ptlogin2.qq.com"
    - "work.weixin.qq.com"

  # 配置后面的nameserver、fallback和nameserver-policy向dns服务器的连接过程是否遵守遵守rules规则
  # 如果为false（默认值）则这三部分的dns服务器在未特别指定的情况下会直连
  # 如果为true，将会按照rules的规则匹配链接方式（走代理或直连），如果有特别指定则任然以指定值为准
  # 仅当proxy-server-nameserver非空时可以开启此选项, 强烈不建议和prefer-h3一起使用
  # 此外，这三者配置中的dns服务器如果出现域名会采用default-nameserver配置项解析，也请确保正确配置default-nameserver
  respect-rules: true

  # 默认 DNS 服务器，主要用于解析 DoH/DoT 的域名
  default-nameserver:
    - system
    - 223.5.5.5
    - 119.29.29.29
    - 8.8.8.8
    - 1.1.1.1
    - 2400:3200::1
    - 2001:4860:4860::8888

  direct-nameserver: []
  direct-nameserver-follow-policy: true

  # 2. 基础 DNS (作为兜底，不建议放太多)
  nameserver:
    - https://hk-hkg.doh.sb/dns-query
    - https://doh.dns.sb/dns-query
    - https://1.0.0.1/dns-query
    - https://1.1.1.1/dns-query
    - https://cloudflare-dns.com/dns-query
    # - 1.1.1.1
    # - 8.8.8.8

  # 3. 强制分流：实现真正的 DNS 隔离
  # nameserver-policy:
  #   # 所有国内域名 -> 阿里/腾讯 DNS (直连)
  #   "geosite:cn":
  #     - 223.5.5.5
  #     - 119.29.29.29
  #     - "https://dns.alidns.com/dns-query"
  #   # 强制让所有被识别为直连的规则走纯 IP DNS，禁止使用 DoH 导致 interface not found
  #   "rule-set:direct":
  #     - 223.5.5.5
  #     - 119.29.29.29
  #   # 所有国外域名 -> Cloudflare/Google (强制走代理)
  #   "geosite:geolocation-!cn":
  #     - "https://1.1.1.1/dns-query#PROXY"
  #     - "https://8.8.8.8/dns-query#PROXY"
  #   # 常见的私有/局域网域名
  #   "geosite:private":
  #     - system
  #     - 223.5.5.5

  # 4. Fallback (备选加密 DNS)
  fallback:
    - https://doh.dns.sb/dns-query
    - https://1.0.0.1/dns-query
    - https://1.1.1.1/dns-query
    - https://cloudflare-dns.com/dns-query
