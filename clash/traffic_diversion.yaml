# gfwlist rules should be placed at the end of domain rules
# to avoid misclassification by other rules
# 黑名单规则应放在域名规则的最后，以避免被其他规则误判
rules:
  - RULE-SET,applications,🖥️ 应用程序
  - RULE-SET,adblock,DIRECT
  - RULE-SET,steven,DIRECT
  - DOMAIN,clash.razord.top,DIRECT
  - DOMAIN,yacd.haishan.me,DIRECT
  - RULE-SET,private,DIRECT
  - RULE-SET,reject,REJECT

  # 特定应用分流
  - RULE-SET,OpenAI,🤖 OpenAI
  - RULE-SET,YouTube,🌍 国外媒体
  - RULE-SET,Netflix,🌍 国外媒体
  - RULE-SET,Disney,🌍 国外媒体
