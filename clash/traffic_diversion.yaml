geodata-mode: true
# geodata-loader: memconservative   # 或 standard
# 指定 geosite.dat 和 geoip.dat 的下载地址（强烈推荐使用 jsdelivr 或 ghproxy 加速）
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"
  # geosite: "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat"
# 自动更新（可选，单位小时）
geo-auto-update: true
geo-update-interval: 24

# Template metadata - 以下字段会在生成时被替换
# name: 订阅或配置名称，用于界面显示
# port: clash 本地监听端口
# socks-port: socks5 端口
# redir-port: redir 端口（可选）
# allow-lan: 是否允许局域网访问（true/false）
# __PROXIES__: 这里会被注入具体代理配置（完整的代理节点列表）
# __PROXY_GROUPS__: 这里会被注入代理分组配置（Proxy Group 模板）

proxy-providers: {}

# Proxies 占位符 - 订阅转换器应将所有节点替换到此处
# 使用占位符 `__PROXIES__`（包含 YAML 列表），示例：
# __PROXIES__:
# - name: "节点1"
#   type: vmess
#   server: 1.2.3.4
#   port: 443
#   uuid: xxxxx
#   alterId: 0
#   cipher: auto
# - name: "节点2"
#   type: ss
#   server: 5.6.7.8
#   port: 8388
#   cipher: chacha20-ietf-poly1305
#   password: "passwd"

proxies: __PROXIES__

# Proxy Groups 模板 - 订阅转换器可根据需要替换或扩展 `__PROXY_GROUPS__`
# 常见分组示例已提供，生成器应替换 `__PROXY_NAMES__` 为所有代理名称的逗号分隔列表
proxy-groups:
  # ==============================
  # 1. 核心控制中心 (Core Controls)
  # ==============================
  - name: 🚀 节点选择
    type: select
    proxies: [♻️ 自动选择, DIRECT, __PROXY_NAMES__]

  - name: ♻️ 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies: [__PROXY_NAMES__]

  # ==============================
  # 2. 基础设施 (Infrastructure)
  # ==============================
  - name: 🚫 广告拦截
    type: select
    proxies: [REJECT, DIRECT, 🚀 节点选择]

  - name: 🛡️ DNS及证书-国内
    type: select
    proxies: [DIRECT, 🚀 节点选择, __PROXY_NAMES__]

  - name: 🌐 DNS及证书-国外
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, __PROXY_NAMES__, DIRECT]

  # ==============================
  # 3. 核心平台服务 (Big Tech & AI)
  # ==============================
  - name: 🤖 人工智能
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, __PROXY_NAMES__, DIRECT]

  - name: 🍎 苹果服务(不代理www.apple.com)
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, __PROXY_NAMES__, DIRECT]

  - name: Ⓜ️ 微软服务
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, __PROXY_NAMES__, DIRECT]

  - name: 🚀 谷歌服务
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, __PROXY_NAMES__]

  # ==============================
  # 4. 社交与媒体 (Social & Media)
  # ==============================
  - name: 💬 社交媒体-国内
    type: select
    proxies: [DIRECT, 🚀 节点选择, __PROXY_NAMES__]

  - name: 📲 社交媒体-国外
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, __PROXY_NAMES__, DIRECT]

  - name: 🎬 视频流媒体-国内
    type: select
    proxies: [DIRECT, 🚀 节点选择, __PROXY_NAMES__]

  - name: 🎥 视频流媒体-国外
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, __PROXY_NAMES__, DIRECT]

  - name: 🎵 音乐平台-国内
