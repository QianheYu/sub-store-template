  - name: 🌍 新闻媒体-国外
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, __PROXY_NAMES__, DIRECT]

  # ==============================
  # 5. 开发、工具与求职 (Productivity)
  # ==============================
  - name: 💻 开发与云服务-国内
    type: select
    proxies: [DIRECT, 🚀 节点选择, __PROXY_NAMES__]

  - name: ☁️ 开发与云服务-国外
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, __PROXY_NAMES__, DIRECT]

  - name: 🛠️ 工具网盘-国内
    type: select
    proxies: [DIRECT, 🚀 节点选择, __PROXY_NAMES__]

  - name: 📦 工具网盘-国外
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, __PROXY_NAMES__, DIRECT]

  - name: 🎓 求职教育-国内
