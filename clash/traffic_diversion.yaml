# Template metadata - 以下字段会在生成时被替换
# name: 订阅或配置名称，用于界面显示
# port: clash 本地监听端口
# socks-port: socks5 端口
# redir-port: redir 端口（可选）
# allow-lan: 是否允许局域网访问（true/false）
# __PROXIES__: 这里会被注入具体代理配置（完整的代理节点列表）
# __PROXY_GROUPS__: 这里会被注入代理分组配置（Proxy Group 模板）

proxy-providers: {}

# Proxies 占位符 - 订阅转换器应将所有节点替换到此处
# 使用占位符 `__PROXIES__`（包含 YAML 列表），示例：
# __PROXIES__:
# - name: "节点1"
#   type: vmess
#   server: 1.2.3.4
#   port: 443
#   uuid: xxxxx
#   alterId: 0
#   cipher: auto
# - name: "节点2"
#   type: ss
#   server: 5.6.7.8
#   port: 8388
#   cipher: chacha20-ietf-poly1305
#   password: "passwd"

proxies: __PROXIES__

# Proxy Groups 模板 - 订阅转换器可根据需要替换或扩展 `__PROXY_GROUPS__`
# 常见分组示例已提供，生成器应替换 `__PROXY_NAMES__` 为所有代理名称的逗号分隔列表
proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies: [♻️ 自动选择, DIRECT, __PROXY_NAMES__]

  - name: ♻️ 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies: [__PROXY_NAMES__]

  - name: 🌍 国外媒体
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, __PROXY_NAMES__]

  - name: 📲 电报信息
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, __PROXY_NAMES__]

  - name: 🤖 OpenAI
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, __PROXY_NAMES__]

  - name: 🍎 苹果服务
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, __PROXY_NAMES__, DIRECT]

  - name: Ⓜ️ 微软服务
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, __PROXY_NAMES__, DIRECT]

  - name: 🖥️ 应用程序
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, __PROXY_NAMES__, DIRECT]

  - name: 🎮 游戏平台
    type: select
    proxies: [DIRECT, 🚀 节点选择, ♻️ 自动选择, __PROXY_NAMES__]

  - name: 📈 网络测速
    type: select
    proxies: [DIRECT, 🚀 节点选择, ♻️ 自动选择, __PROXY_NAMES__]

  - name: 🐟 漏网之鱼
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, DIRECT, __PROXY_NAMES__]

