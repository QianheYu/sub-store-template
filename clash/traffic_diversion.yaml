  - name: 🏫 求职教育-国外
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, __PROXY_NAMES__, DIRECT]

  # ==============================
  # 6. 生活、电商与金融 (Life & Commerce)
  # ==============================
