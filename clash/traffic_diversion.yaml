  - RULE-SET,Microsoft,Ⓜ️ 微软服务
  - RULE-SET,Steam,🎮 游戏平台
  - RULE-SET,Speedtest,📈 网络测速

  # 新增常用服务分流
  - RULE-SET,openai,🤖 OpenAI
  - RULE-SET,onedrive,🚀 节点选择
  - RULE-SET,github,🚀 节点选择
  - RULE-SET,telegram,📲 电报信息
